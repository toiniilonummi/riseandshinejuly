<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<title>Rise &amp; Shine — July 2026</title>

<!-- iOS "Add to Home Screen" behavior -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Rise & Shine">
<link rel="apple-touch-icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='22' fill='%23F6CFE3'/%3E%3Ccircle cx='50' cy='50' r='20' fill='%23B85A1E' stroke='%237A1F49' stroke-width='3'/%3E%3Cg stroke='%237A1F49' stroke-width='4' stroke-linecap='round'%3E%3Cline x1='50' y1='20' x2='50' y2='8'/%3E%3Cline x1='50' y1='80' x2='50' y2='92'/%3E%3Cline x1='20' y1='50' x2='8' y2='50'/%3E%3Cline x1='80' y1='50' x2='92' y2='50'/%3E%3Cline x1='29' y1='29' x2='20' y2='20'/%3E%3Cline x1='71' y1='71' x2='80' y2='80'/%3E%3Cline x1='29' y1='71' x2='20' y2='80'/%3E%3Cline x1='71' y1='29' x2='80' y2='20'/%3E%3C/g%3E%3C/svg%3E">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Kalam:wght@400;700&family=Caveat:wght@600;700&family=Special+Elite&display=swap" rel="stylesheet">

<style>
  :root{
    --bg-outer:#D8DE4C;
    --paper:#F6CFE3;
    --paper-2:#EFB3D2;
    --ink:#B85A1E;
    --ink-dark:#7A1F49;
    --ink-soft:rgba(184,90,30,0.32);
    --accent:#C81C6E;
    --accent-dark:#8C0F4E;
    --accent-soft:rgba(200,28,110,0.35);
    --muted:#9C5B3A;
    --card-border:#7A1F49;
    --green:#D8DE4C;
    --green-dark:#9AA22A;
  }

  *{ box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

  html,body{
    height:100%;
    margin:0;
    overscroll-behavior:none;
    touch-action:manipulation;
  }

  body{
    background:
      radial-gradient(circle at 20% 10%, rgba(255,255,255,0.35), transparent 45%),
      radial-gradient(circle at 85% 90%, rgba(0,0,0,0.05), transparent 40%),
      var(--bg-outer);
    font-family:'Kalam', sans-serif;
    color:var(--ink-dark);
    height:100dvh;
    width:100%;
    overflow:hidden;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  /* subtle paper grain */
  body::before{
    content:'';
    position:fixed; inset:0;
    background-image:
      radial-gradient(rgba(43,69,112,0.035) 1px, transparent 1px);
    background-size:3px 3px;
    pointer-events:none;
    mix-blend-mode:multiply;
  }

  .card{
    position:relative;
    width:min(96vw, 430px);
    height:min(96dvh, 860px);
    background:var(--paper);
    border:3px solid var(--card-border);
    border-radius:22px;
    box-shadow:
      0 1px 0 rgba(255,255,255,0.5) inset,
      0 18px 40px rgba(27,46,75,0.18);
    display:flex;
    flex-direction:column;
    padding:calc(4px + 1.6vh) 4.2vw calc(4px + 1.4vh);
    overflow:hidden;
  }

  /* die-cut notch corners like a punch card */
  .card::before, .card::after{
    content:'';
    position:absolute;
    width:16px; height:16px;
    background:radial-gradient(circle at center, transparent 8px, transparent 8px);
  }

  .hole{
    position:absolute;
    top:14px; left:16px;
    width:22px; height:22px;
    border-radius:50%;
    background:
      radial-gradient(circle at 35% 30%, rgba(0,0,0,0.18), transparent 60%),
      var(--paper);
    box-shadow: inset 0 2px 4px rgba(27,46,75,0.35), 0 1px 0 rgba(255,255,255,0.6);
    border:1.5px solid var(--ink-soft);
  }

  .eyebrow{
    font-family:'Special Elite', monospace;
    text-align:center;
    font-size:clamp(9px, 2.6vw, 11px);
    letter-spacing:3px;
    color:var(--muted);
    margin:0 0 2px;
    text-transform:uppercase;
  }

  h1.month{
    margin:0;
    text-align:center;
    font-weight:700;
    font-size:clamp(24px, 9.5vw, 40px);
    line-height:1;
    color:var(--ink);
    letter-spacing:0.5px;
    text-shadow:1px 1px 0 rgba(255,255,255,0.4);
  }

  .subtitle{
    text-align:center;
    font-family:'Caveat', cursive;
    font-weight:600;
    font-size:clamp(15px, 4.4vw, 19px);
    color:var(--ink);
    margin:0 0 calc(2px + 0.6vh);
  }
  .subtitle .u{
    text-decoration: underline wavy var(--accent);
    text-underline-offset:3px;
  }

  .divider{
    border:none;
    border-top:2px dashed var(--ink-soft);
    margin:2px 0 calc(4px + 0.8vh);
  }

  .weekday-row{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    margin-bottom:2px;
  }
  .weekday-row span{
    text-align:center;
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:clamp(13px, 4vw, 17px);
    color:var(--muted);
  }
  .weekday-row span.weekend{ color:var(--accent-dark); }

  .grid{
    flex:1;
    display:grid;
    grid-template-rows:repeat(5, 1fr);
    gap:2px;
    min-height:0;
  }
  .grid-row{
    display:grid;
    grid-template-columns:repeat(7, 1fr);
    gap:2px;
    min-height:0;
  }

  .cell{
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:0;
    min-width:0;
  }
  .cell.empty{ visibility:hidden; }

  .star-btn{
    all:unset;
    display:flex;
    align-items:center;
    justify-content:center;
    width:100%;
    height:100%;
    max-width:56px;
    max-height:56px;
    aspect-ratio:1/1;
    cursor:pointer;
    position:relative;
  }

  .star-btn svg{
    width:100%;
    height:100%;
    overflow:visible;
    transition:transform .18s cubic-bezier(.34,1.56,.64,1);
  }

  .sun-shape{
    fill:none;
    stroke:var(--ink-soft);
    stroke-width:5;
    stroke-linejoin:round;
    transition:fill .16s ease, stroke .16s ease;
  }
  .sun-shape line{ stroke-linecap:round; }
  .weekend .sun-shape{ stroke:var(--accent-soft); }

  .day-num{
    font-family:'Kalam', sans-serif;
    font-weight:700;
    font-size:12px;
    fill:var(--ink-soft);
    transition:fill .16s ease;
  }
  .weekend .day-num{ fill:var(--accent-soft); }

  /* punched / completed state */
  .star-btn.done .sun-shape{
    fill:var(--accent);
    stroke:var(--accent-dark);
  }
  .star-btn.done .day-num{ fill:#F6CFE3; }
  .star-btn.done.weekend .sun-shape{
    fill:var(--green);
    stroke:var(--green-dark);
  }
  .star-btn.done.weekend .day-num{ fill:var(--ink-dark); }

  .star-btn.pop svg{ transform:scale(1.28) rotate(-6deg); }

  .footer{
    margin-top:calc(4px + 0.8vh);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:8px;
  }

  .progress-text{
    font-family:'Caveat', cursive;
    font-weight:700;
    font-size:clamp(15px, 4.6vw, 19px);
    color:var(--ink);
  }
  .progress-text b{ color:var(--accent-dark); }

  .reset-btn{
    all:unset;
    font-family:'Special Elite', monospace;
    font-size:9px;
    letter-spacing:1.5px;
    color:var(--muted);
    text-transform:uppercase;
    padding:4px 8px;
    border:1.5px dashed var(--ink-soft);
    border-radius:20px;
    cursor:pointer;
  }
  .reset-btn:active{ opacity:0.6; }

  /* Add to Home Screen banner */
  .a2hs{
    position:fixed;
    left:0; right:0; bottom:0;
    display:flex;
    justify-content:center;
    padding:0 3vw calc(env(safe-area-inset-bottom) + 12px);
    transform:translateY(140%);
    transition:transform .45s cubic-bezier(.22,1,.36,1);
    z-index:20;
    pointer-events:none;
  }
  .a2hs.show{ transform:translateY(0); pointer-events:auto; }

  .a2hs-card{
    width:min(96vw, 430px);
    background:var(--ink-dark);
    color:var(--paper);
    border-radius:16px;
    border:2px solid var(--accent-dark);
    box-shadow:0 12px 30px rgba(0,0,0,0.35);
    padding:12px 14px;
    display:flex;
    align-items:center;
    gap:10px;
    font-family:'Kalam', sans-serif;
  }
  .a2hs-icon{
    flex:0 0 auto;
    width:30px; height:30px;
    display:flex; align-items:center; justify-content:center;
  }
  .a2hs-text{
    flex:1;
    font-size:13px;
    line-height:1.35;
  }
  .a2hs-text b{ color:var(--accent); }
  .a2hs-close{
    all:unset;
    flex:0 0 auto;
    font-size:18px;
    line-height:1;
    color:var(--paper);
    opacity:0.6;
    padding:4px 6px;
    cursor:pointer;
  }

  @media (prefers-reduced-motion: reduce){
    .star-btn svg, .a2hs{ transition:none; }
  }
</style>
</head>
<body>

  <div class="card" id="card">
    <div class="hole"></div>
    <h1 class="month">JULY 2026</h1>
    <p class="subtitle">Rise &amp; shine! <span class="u">Wake up earlier</span> challenge tracker</p>
    <hr class="divider">

    <div class="weekday-row">
      <span class="weekend">S</span><span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span class="weekend">S</span>
    </div>

    <div class="grid" id="grid"></div>

    <div class="footer">
      <p class="progress-text" id="progressText">0 of 31 mornings</p>
      <button class="reset-btn" id="resetBtn" type="button">reset month</button>
    </div>
  </div>

  <div class="a2hs" id="a2hs">
    <div class="a2hs-card">
      <div class="a2hs-icon">
        <svg viewBox="0 0 24 24" width="26" height="26" fill="none" stroke="#F6CFE3" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2v13"/><path d="M8 6l4-4 4 4"/><path d="M4 13v6a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2v-6"/>
        </svg>
      </div>
      <div class="a2hs-text">
        <b>Keep this on your Home Screen.</b><br>
        Tap the Share icon below, then “Add to Home Screen” — your suns will be right there every morning.
      </div>
      <button class="a2hs-close" id="a2hsClose" aria-label="Dismiss">×</button>
    </div>
  </div>

<script>
(function(){
  const YEAR = 2026, MONTH = 6; // July = index 6
  const DAYS_IN_MONTH = new Date(YEAR, MONTH+1, 0).getDate();
  const grid = document.getElementById('grid');
  const progressText = document.getElementById('progressText');
  const STORAGE_KEY = 'july2026:completed';
  let completed = new Set();

  // ---- Build calendar grid (weeks of 7, Sun-first) ----
  const firstWeekday = new Date(YEAR, MONTH, 1).getDay(); // 0=Sun
  const totalCells = Math.ceil((firstWeekday + DAYS_IN_MONTH) / 7) * 7;
  const rows = totalCells / 7;

  function sunIcon(){
    // hand-drawn-ish sun: wobbly circle face + 8 slightly uneven rays
    return '<g class="sun-shape">' +
      '<path d="M32 18 C40 18 46 24 46 32 C46 40 39 47 31 46 C24 46 18 39 18 31 C18 24 24 18 32 18 Z"/>' +
      '<line x1="32" y1="17" x2="32" y2="3"/>' +
      '<line x1="42.6" y1="21.4" x2="50.4" y2="13.6"/>' +
      '<line x1="47" y1="32" x2="62" y2="32"/>' +
      '<line x1="42.6" y1="42.6" x2="51.1" y2="51.1"/>' +
      '<line x1="32" y1="47" x2="32" y2="61"/>' +
      '<line x1="21.4" y1="42.6" x2="13.6" y2="50.4"/>' +
      '<line x1="17" y1="32" x2="2" y2="32"/>' +
      '<line x1="21.4" y1="21.4" x2="12.9" y2="12.9"/>' +
      '</g>';
  }

  const buttons = {}; // day -> button el

  for(let r=0; r<rows; r++){
    const rowEl = document.createElement('div');
    rowEl.className = 'grid-row';
    for(let c=0; c<7; c++){
      const cellIndex = r*7 + c;
      const dayNum = cellIndex - firstWeekday + 1;
      const cellEl = document.createElement('div');
      cellEl.className = 'cell';

      if(dayNum < 1 || dayNum > DAYS_IN_MONTH){
        cellEl.classList.add('empty');
      } else {
        const isWeekend = (c === 0 || c === 6);
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.className = 'star-btn' + (isWeekend ? ' weekend' : '');
        btn.setAttribute('aria-label', 'July ' + dayNum + (isWeekend ? ' (bonus weekend)' : '') );
        btn.dataset.day = dayNum;
        btn.innerHTML =
          '<svg viewBox="0 0 64 64">' + sunIcon() +
          '<text class="day-num" x="32" y="37" text-anchor="middle">' + dayNum + '</text></svg>';
        btn.addEventListener('click', () => toggleDay(dayNum, btn));
        buttons[dayNum] = btn;
        cellEl.appendChild(btn);
      }
      rowEl.appendChild(cellEl);
    }
    grid.appendChild(rowEl);
  }

  function isWeekendDay(day){
    const wd = new Date(YEAR, MONTH, day).getDay();
    return wd === 0 || wd === 6;
  }

  function updateProgress(){
    const weekdayCount = [...completed].filter(d => !isWeekendDay(d)).length;
    const weekendCount = [...completed].filter(d => isWeekendDay(d)).length;
    progressText.innerHTML = '<b>' + completed.size + '</b> of ' + DAYS_IN_MONTH + ' mornings' +
      (weekendCount ? ' · ' + weekendCount + ' bonus' : '');
  }

  function paint(){
    Object.entries(buttons).forEach(([day, btn]) => {
      btn.classList.toggle('done', completed.has(Number(day)));
    });
    updateProgress();
  }

  function toggleDay(day, btn){
    if(completed.has(day)){ completed.delete(day); }
    else { completed.add(day); }
    btn.classList.add('pop');
    setTimeout(() => btn.classList.remove('pop'), 200);
    paint();
    persist();
  }

  function persist(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify([...completed]));
    }catch(e){ /* storage unavailable (e.g. private browsing) — keep in-memory state */ }
  }

  function load(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      if(raw){
        completed = new Set(JSON.parse(raw));
      }
    }catch(e){ /* no saved data yet */ }
    paint();
  }

  document.getElementById('resetBtn').addEventListener('click', () => {
    if(confirm('Clear all punched suns for July?')){
      completed = new Set();
      paint();
      persist();
    }
  });

  load();

  // ---- Add to Home Screen prompt (first visit, iOS Safari, not already installed) ----
  const a2hs = document.getElementById('a2hs');
  const isStandalone = window.navigator.standalone === true ||
    window.matchMedia('(display-mode: standalone)').matches;
  const isIOS = /iphone|ipad|ipod/i.test(navigator.userAgent);

  function maybeShowA2HS(){
    if(isStandalone) return;
    let seen = false;
    try{ seen = localStorage.getItem('july2026:a2hsSeen') === 'true'; }catch(e){ seen = false; }
    if(!seen){
      setTimeout(() => a2hs.classList.add('show'), 700);
    }
  }
  maybeShowA2HS();

  document.getElementById('a2hsClose').addEventListener('click', () => {
    a2hs.classList.remove('show');
    try{ localStorage.setItem('july2026:a2hsSeen', 'true'); }catch(e){}
  });
})();
</script>
</body>
</html>
